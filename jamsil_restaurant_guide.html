<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>잠실 식당 가이드</title>
<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=6473f7eead2b22947a0235b62ce16a72&autoload=false"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a1a;font-size:14px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.header{padding:0.9rem 1.25rem 0.7rem;background:#fff;border-bottom:0.5px solid #e0deda;flex-shrink:0}
.header h1{font-size:15px;font-weight:500;margin-bottom:0.55rem}
.tabs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:0.55rem}
.tab{padding:4px 11px;border-radius:20px;border:0.5px solid #ccc;font-size:12px;cursor:pointer;background:#fff;color:#666;font-family:inherit;transition:all .15s}
.tab.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.view-btns{display:flex;gap:6px}
.view-btn{padding:4px 12px;border-radius:6px;border:0.5px solid #e0deda;font-size:12px;cursor:pointer;background:#fff;color:#666;font-family:inherit;transition:all .15s}
.view-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.main{flex:1;display:flex;overflow:hidden}
.list-panel{width:240px;flex-shrink:0;overflow-y:auto;padding:0.6rem;background:#f5f4f0;border-right:0.5px solid #e0deda}
.card{background:#fff;border:0.5px solid #e0deda;border-radius:10px;padding:9px 11px;margin-bottom:6px;cursor:pointer;transition:border-color .15s;text-decoration:none;display:block}
.card:hover,.card.active{border-color:#1a1a1a}
.card-name{font-size:13px;font-weight:500;color:#1a1a1a;margin-bottom:3px}
.card-hint{font-size:11px;color:#aaa}
.card.no-map .card-hint{color:#ccc}
#map{flex:1;background:#e8e8e8}
.list-view .list-panel{width:100%;border-right:none;overflow-y:auto}
.list-view .list-panel .inner{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:7px}
.list-view .list-panel .card{margin-bottom:0}
.list-view #map{display:none}
.map-view #map{display:block}
</style>
</head>
<body>
<div class="header">
  <h1>잠실 식당 가이드</h1>
  <div class="tabs" id="tabs"></div>
  <div class="view-btns">
    <button class="view-btn active" id="btnMap" onclick="setView('map')">지도 보기</button>
    <button class="view-btn" id="btnList" onclick="setView('list')">목록 보기</button>
  </div>
</div>
<div class="main map-view" id="main">
  <div class="list-panel" id="listPanel"><div class="inner" id="listInner"></div></div>
  <div id="map"></div>
</div>

<script>
var COORDS = {
  "카페/음료": [
    {name:"비터솔트", lat:37.5092018, lng:127.1105198},
    {name:"기투커피로스터스", lat:37.5127577, lng:127.1142907},
    {name:"폴바셋 잠실", lat:37.5120835, lng:127.0984593},
    {name:"스타벅스 리저브 잠실", lat:37.5154847, lng:127.0990555},
    {name:"블루보틀 잠실", lat:37.513397, lng:127.1034949}
  ]
};

var NO_MAP = {
  "카페/음료": [],
  "버거/브런치/양식": ["다운타우너 잠실","버거파크","브루클린더버거","조인트","쉐이크쉑 잠실","고든램지버거 롯데월드몰","더플레이스 잠실","빌즈 잠실","피에프창 잠실"],
  "면류 (한식)": ["필동면옥","황도바지락칼국수","잠실제면소","두레국수","고기리막국수 잠실","광화문미진 잠실"],
  "면류 (라멘)": ["멘야하나비","라멘트럭우마이도","유즈라멘","오레노라멘","팔각동칼누들바 방이본점"],
  "일식": ["스시노칸도","갓덴스시","잇쇼니야키토리","잔잔토리","키조쿠규카츠","정이자카야 나무","코다차야 잠실"],
  "중식/마라": ["홍콩반점 잠실","마라공방","라화쿵부","하이디라오 잠실","샤오바오우육면"],
  "고기/구이": ["루어니언 잠실","미트컬처","마포갈매기 잠실","육전식당 잠실","한와담","이춘복참치 잠실","송리단길 고깃집"],
  "샤브샤브/전골": ["방이샤브샤브","샤브로21","방이옥"],
  "돈까스/분식": ["돈까스의집 잠실","고봉민김밥 잠실"],
  "한식": ["서래향","청화집","백채김치찌개","송계옥","서울깍두기","강강술래 잠실","봉피양 잠실","삼백집 잠실","경천애인","2237","정돈 잠실"],
  "기타 외국식": ["유한 태국음식","온더보더 잠실","팀호완 잠실"],
  "포차/술집": ["신천포차","잠실포차","미도인","생활맥주 잠실","크래프트한스 잠실"],
  "기타": ["키친205"]
};

var cats = Object.keys(Object.assign({}, COORDS, NO_MAP));
cats = ["카페/음료","버거/브런치/양식","면류 (한식)","면류 (라멘)","일식","중식/마라","고기/구이","샤브샤브/전골","돈까스/분식","한식","기타 외국식","포차/술집","기타"];

var cur = cats[0];
var viewMode = 'map';
var map, markers = [], infowindow;

function initMap() {
  kakao.maps.load(function() {
    var center = new kakao.maps.LatLng(37.5120, 127.1030);
    map = new kakao.maps.Map(document.getElementById('map'), {
      center: center,
      level: 4
    });
    infowindow = new kakao.maps.InfoWindow({ zIndex: 1 });
    renderTabs();
    renderList();
    renderMarkers();
  });
}

function clearMarkers() {
  markers.forEach(function(m) { m.setMap(null); });
  markers = [];
  if (infowindow) infowindow.close();
}

function renderMarkers() {
  clearMarkers();
  var places = COORDS[cur] || [];
  if (!places.length) return;
  var bounds = new kakao.maps.LatLngBounds();
  places.forEach(function(p) {
    var pos = new kakao.maps.LatLng(p.lat, p.lng);
    var marker = new kakao.maps.Marker({ position: pos, map: map, title: p.name });
    kakao.maps.event.addListener(marker, 'click', function() {
      infowindow.setContent(
        '<div style="padding:6px 10px;font-size:13px;font-weight:500;white-space:nowrap">' + p.name + '</div>'
      );
      infowindow.open(map, marker);
      highlightCard(p.name);
    });
    markers.push(marker);
    bounds.extend(pos);
  });
  if (places.length > 1) map.setBounds(bounds);
  else map.setCenter(new kakao.maps.LatLng(places[0].lat, places[0].lng));
}

function highlightCard(name) {
  document.querySelectorAll('.card').forEach(function(c) { c.classList.remove('active'); });
  var t = document.querySelector('[data-name="' + name + '"]');
  if (t) { t.classList.add('active'); t.scrollIntoView({ block: 'nearest' }); }
}

function renderList() {
  var places = COORDS[cur] || [];
  var nomap = NO_MAP[cur] || [];
  var html = '';
  places.forEach(function(p) {
    var esc = p.name.replace(/"/g, '&quot;');
    html += '<a class="card" data-name="' + esc + '" href="https://map.kakao.com/link/search/' + encodeURIComponent(p.name) + '" target="_blank" rel="noopener" onclick="onCardClick(event,' + p.lat + ',' + p.lng + ',\'' + p.name.replace(/'/g,"\\'") + '\')">';
    html += '<div class="card-name">' + p.name + '</div><div class="card-hint">위치 확인됨</div></a>';
  });
  nomap.forEach(function(n) {
    html += '<a class="card no-map" href="https://map.kakao.com/link/search/' + encodeURIComponent(n) + '" target="_blank" rel="noopener">';
    html += '<div class="card-name">' + n + '</div><div class="card-hint">카카오 지도에서 보기</div></a>';
  });
  document.getElementById('listInner').innerHTML = html;
}

function onCardClick(e, lat, lng, name) {
  if (viewMode !== 'map') return;
  e.preventDefault();
  map.setCenter(new kakao.maps.LatLng(lat, lng));
  map.setLevel(3);
  highlightCard(name);
}

function renderTabs() {
  var el = document.getElementById('tabs');
  el.innerHTML = '';
  cats.forEach(function(c) {
    var b = document.createElement('button');
    b.className = 'tab' + (c === cur ? ' active' : '');
    b.textContent = c;
    b.onclick = function() { cur = c; renderTabs(); renderList(); if (viewMode === 'map') renderMarkers(); };
    el.appendChild(b);
  });
}

function setView(v) {
  viewMode = v;
  var main = document.getElementById('main');
  main.className = 'main ' + v + '-view';
  document.getElementById('btnMap').className = 'view-btn' + (v === 'map' ? ' active' : '');
  document.getElementById('btnList').className = 'view-btn' + (v === 'list' ? ' active' : '');
  var lp = document.getElementById('listPanel');
  lp.style.width = v === 'list' ? '100%' : '240px';
  renderList();
  if (v === 'map' && map) renderMarkers();
}

window.onload = initMap;
</script>
</body>
</html>
