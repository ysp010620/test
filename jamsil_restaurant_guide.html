<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a1a;font-size:14px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.header{padding:0.8rem 1rem 0.6rem;background:#fff;border-bottom:0.5px solid #e0deda;flex-shrink:0}
.header h1{font-size:15px;font-weight:500;margin-bottom:0.5rem}
.tabs{display:flex;flex-wrap:wrap;gap:4px}
.tab{padding:4px 10px;border-radius:20px;border:0.5px solid #ccc;font-size:12px;cursor:pointer;background:#fff;color:#666;font-family:inherit;transition:all .15s}
.tab.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}

/* 데스크탑: 좌우 */
.main{flex:1;display:flex;overflow:hidden}
.list-panel{width:240px;flex-shrink:0;overflow-y:auto;padding:0.6rem;background:#f5f4f0;border-right:0.5px solid #e0deda}
#map{flex:1}

/* 카드 */
.card{background:#fff;border:0.5px solid #e0deda;border-radius:10px;margin-bottom:6px;overflow:hidden;cursor:pointer;transition:border-color .15s}
.card:hover{border-color:#bbb}
.card.active{border-color:#1a1a1a}
.card-head{padding:9px 11px;display:flex;align-items:center;justify-content:space-between}
.card-name{font-size:13px;font-weight:500;color:#1a1a1a}
.card-dot-row{display:flex;align-items:center;gap:4px;margin-top:3px}
.dot-green{width:6px;height:6px;border-radius:50%;background:#03c75a;flex-shrink:0}
.dot-gray{width:6px;height:6px;border-radius:50%;background:#ccc;flex-shrink:0}
.card-sub{font-size:11px;color:#aaa}
.card-arrow{font-size:11px;color:#ccc;transition:transform .2s;flex-shrink:0}
.card.open .card-arrow{transform:rotate(180deg)}
.card-body{display:none;padding:0 11px 10px;border-top:0.5px solid #f0efec}
.card.open .card-body{display:block}
.info-row{display:flex;gap:6px;margin-top:7px;font-size:12px;line-height:1.5}
.info-label{color:#aaa;flex-shrink:0;width:44px}
.info-val{color:#1a1a1a}
.naver-btn{display:inline-block;margin-top:9px;font-size:11px;color:#03c75a;cursor:pointer;text-decoration:none}
.preparing{font-size:12px;color:#aaa;margin-top:7px}

/* 모바일: 위아래 */
@media(max-width:640px){
  .main{flex-direction:column}
  #map{flex:none;height:42vh}
  .list-panel{width:100%;border-right:none;border-top:0.5px solid #e0deda;flex:1;overflow-y:auto}
}
</style>

var cats = Object.keys(DATA);
var cur = cats[0];
var map, markers = [], infowindow, openCard = null;

function naverSearch(name) {
  window.open('https://search.naver.com/search.naver?query=' + encodeURIComponent(name + ' 잠실'), '_blank');
}

function initApp() {
  kakao.maps.load(function() {
    map = new kakao.maps.Map(document.getElementById('map'), {
      center: new kakao.maps.LatLng(37.5120, 127.1030),
      level: 4
    });
    infowindow = new kakao.maps.InfoWindow({ zIndex: 1 });
    renderTabs();
    renderList();
    renderMarkers();
  });
}

function clearMarkers() {
  markers.forEach(function(m) { m.setMap(null); });
  markers = [];
  if (infowindow) infowindow.close();
}

function renderMarkers() {
  clearMarkers();
  var places = DATA[cur].confirmed;
  if (!places.length) return;
  var bounds = new kakao.maps.LatLngBounds();
  places.forEach(function(p) {
    var pos = new kakao.maps.LatLng(p.lat, p.lng);
    var marker = new kakao.maps.Marker({ position: pos, map: map, title: p.name });
    kakao.maps.event.addListener(marker, 'click', function() {
      infowindow.setContent('<div style="padding:6px 10px;font-size:12px;font-weight:500;white-space:nowrap">' + p.name + '</div>');
      infowindow.open(map, marker);
      toggleCard(p.name, true);
    });
    markers.push(marker);
    bounds.extend(pos);
  });
  if (places.length > 1) map.setBounds(bounds);
  else { map.setCenter(new kakao.maps.LatLng(places[0].lat, places[0].lng)); map.setLevel(4); }
}

function toggleCard(name, fromMarker) {
  var el = document.querySelector('[data-name="' + name.replace(/"/g,'&quot;') + '"]');
  if (!el) return;
  var isOpen = el.classList.contains('open');
  document.querySelectorAll('.card.open').forEach(function(c) { c.classList.remove('open','active'); });
  if (!isOpen) {
    el.classList.add('open','active');
    el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    if (fromMarker) return;
    var lat = el.getAttribute('data-lat');
    var lng = el.getAttribute('data-lng');
    if (lat && lng) {
      map.setCenter(new kakao.maps.LatLng(parseFloat(lat), parseFloat(lng)));
      map.setLevel(3);
    }
  }
}

function renderList() {
  var confirmed = DATA[cur].confirmed;
  var unconfirmed = DATA[cur].unconfirmed;
  var html = '';

  confirmed.forEach(function(p) {
    var esc = p.name.replace(/"/g,'&quot;');
    var nEsc = p.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    html += '<div class="card" data-name="' + esc + '" data-lat="' + p.lat + '" data-lng="' + p.lng + '" onclick="toggleCard(\'' + nEsc + '\')">';
    html += '<div class="card-head"><div><div class="card-name">' + p.name + '</div>';
    html += '<div class="card-dot-row"><span class="dot-green"></span><span class="card-sub">위치 확인</span></div></div>';
    html += '<span class="card-arrow">▾</span></div>';
    html += '<div class="card-body">';
    html += '<div class="info-row"><span class="info-label">주소</span><span class="info-val">' + p.addr + '</span></div>';
    html += '<div class="info-row"><span class="info-label">운영시간</span><span class="info-val">' + p.hours + '</span></div>';
    html += '<div class="info-row"><span class="info-label">대표메뉴</span><span class="info-val">' + p.menu + '</span></div>';
    html += '<a class="naver-btn" onclick="event.stopPropagation();naverSearch(\'' + nEsc + '\')">네이버에서 상세 보기 ↗</a>';
    html += '</div></div>';
  });

  unconfirmed.forEach(function(n) {
    var nEsc = n.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    var esc = n.replace(/"/g,'&quot;');
    html += '<div class="card" data-name="' + esc + '" onclick="toggleUnconfirmed(this)">';
    html += '<div class="card-head"><div><div class="card-name">' + n + '</div>';
    html += '<div class="card-dot-row"><span class="dot-gray"></span><span class="card-sub">위치 미확인</span></div></div>';
    html += '<span class="card-arrow">▾</span></div>';
    html += '<div class="card-body">';
    html += '<p class="preparing">정보 준비 중이에요.</p>';
    html += '<a class="naver-btn" onclick="event.stopPropagation();naverSearch(\'' + nEsc + '\')">네이버에서 검색하기 ↗</a>';
    html += '</div></div>';
  });

  document.getElementById('listPanel').innerHTML = html;
}

function toggleUnconfirmed(el) {
  var isOpen = el.classList.contains('open');
  document.querySelectorAll('.card.open').forEach(function(c) { c.classList.remove('open','active'); });
  if (!isOpen) el.classList.add('open','active');
}

function renderTabs() {
  var el = document.getElementById('tabs');
  el.innerHTML = '';
  cats.forEach(function(c) {
    var b = document.createElement('button');
    b.className = 'tab' + (c === cur ? ' active' : '');
    b.textContent = c;
    b.onclick = function() {
      cur = c;
      document.querySelectorAll('.card.open').forEach(function(card) { card.classList.remove('open','active'); });
      renderTabs();
      renderList();
      renderMarkers();
    };
    el.appendChild(b);
  });
}

window.onload = initApp;
</script>
</body>
